name: Deploy Producer Service

on:
  push:
    branches:
      - main

    paths:
      - 'producer/**'
      - '.github/workflows/producer-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t banking-producer ./producer

      - name: Tag image
        run: |
          docker tag banking-producer:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/banking-producer:latest

      - name: Push image to ECR
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/banking-producer:latest

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
          --cluster banking-ledger-cluster \
          --service banking-producer-service \
          --force-new-deployment
